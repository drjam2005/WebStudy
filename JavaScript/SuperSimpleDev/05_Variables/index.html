<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title> Variables </title>
</head>
<body>
	<button onclick="alert(`Quantity: ${cartQuantity}`);"> Show Quantity </button>
	<button onclick=""> Add to Cart </button>
	<button onclick="cartQuantity += 2;"> +2 </button>
	<button onclick="cartQuantity += 3;"> +3 </button>
	<button onclick="cartQuantity = 0;"> Reset Cart </button>
</body>
	<script>
		let cartQuantity = 0;
	</script>
</html>
