<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title> Booleans and If-Statements </title>
</head>
<body>
	<script>
		let var1 = true;
		let var2 = true;
		if (var1) {
			alert('Var1 is true!');
		} else if (var2) {
			alert('Var2 is true!');
		} else {
			alert('None is true!');
		}
	</script>
</body>
</html>
