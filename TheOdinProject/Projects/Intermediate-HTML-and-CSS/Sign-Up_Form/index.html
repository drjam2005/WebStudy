<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title> Sign-Up Form </title>
		<link href="styles.css" rel="stylesheet">
	</head>
	<body>
		<div class="main-content">
			<div class="side-container">
				<img id="side-image" src="https://plus.unsplash.com/premium_photo-1667339685757-f4bc7e642a2c?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
				<div class="logo-banner">
					<img src="./assets/odin-lined.png" alt="">
					<div>ODIN</div>
				</div>
			</div>
			<div class="form-container">
				<div class="intro">
					<p>
						This is not a real online service!
						Sign up <em>now</em> to get started.
					</p>
					<p>You <em>know</em> you want to.</p>
				</div>

				<form action="https://httpbin.org/post" method="post" id="form-main">
					<h2>Let's do this!</h2>
					<div class="form-row">
						<div class="field">
							<label for="first-name">FIRST NAME</label>
							<input type="text" id="first-name" name="first_name" value="Thor" required>
						</div>
						<div class="field">
							<label for="last-name">LAST NAME</label>
							<input type="text" id="last-name" name="last_name" value="Odinson" required>
						</div>
					</div>
					<div class="form-row">
						<div class="field">
							<label for="email">EMAIL</label>
							<input type="email" id="email" name="email" required>
						</div>
						<div class="field">
							<label for="phone">PHONE NUMBER</label>
							<input type="tel" id="phone" name="phone">
						</div>
					</div>
					<div class="form-row">
						<div class="field">
							<label for="password">PASSWORD</label>
							<input type="password" id="password" name="password" minlength="8" required>
						</div>
						<div class="field">
							<label for="confirm-password">CONFIRM PASSWORD</label>
							<input type="password" id="confirm-password" name="confirm_password" minlength="8" required>
						</div>
					</div>
				</form>

				<div class="account-actions">
					<button type="submit" form="form-main">Create Account</button>
					<p>Already have an account? <a href="https://httpbin.org/post">Log in</a></p>
				</div>
			</div>
		</div>
	</body>
</html>
