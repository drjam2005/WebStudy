<!DOCTYPE html>
<html>
	<head>
		<title> Flexbox </title>
		<style>
			.flex-container {
				background: aqua;
				border: 4px solid blue;
				padding: 12px;
				display: flex;
			}

			.flex-container div {
				background: peachpuff;
				border: 3px solid brown;
				flex: 1;
				min-height: 100px;
			}
		</style>
	</head>
	<body>
		<div class="flex-container">
			<div class="one"></div>
			<div class="two"></div>
			<div class="three"></div>
			<div class="four"></div>
		</div>
	</body>
</html>
