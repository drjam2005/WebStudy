<!DOCTYPE html>
<html>
	<head>
		<title> Flexbox </title>
		<style>
			.container {
				display: flex;
				height: 50px;
				gap: 10px;
			}

			.item {
				background: aqua;
				border: 4px solid blue;
				height: 100%;
				flex: 1;
			}

			.item-2 {
				flex: 5;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="item item-1"></div>
			<div class="item item-2"></div>
			<div class="item item-3"></div>
			<div class="item item-4"></div>
		</div>
	</body>
</html>
