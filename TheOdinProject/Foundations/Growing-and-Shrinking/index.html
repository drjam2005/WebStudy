<!DOCTYPE html>
<html>
	<head>
		<title> Grow and Shrink </title>
		<style>
			div {
				border: 2px solid red;
			}
			.parent {
			  display: flex;
			  padding: 10px;
			  width: 300px;
			}

			.parent div {
			  background: peachpuff;
			  border: 4px solid brown;
			  height: 100px;
			}
		</style>
	</head>
	<body>
		<div class="parent">
			<div class="child one"> child 1 </div>
			<div class="child two"> child 2 </div>
			<div class="child three"> child 3 </div>
		</div>
	</body>
</html>
