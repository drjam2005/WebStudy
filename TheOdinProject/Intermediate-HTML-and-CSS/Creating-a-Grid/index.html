<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Creating a Grid</title>
		<style>

			.container {
				display: grid;
				grid-template: 50px 50px / 50px 50px 50px;
			}

		</style>
	</head>
	<body>
		<div class="container">
			<div>Item 1</div>
			<div>Item 2</div>
			<div>Item 3</div>
			<div>Item 4</div>
		</div>
	</body>
</html>
